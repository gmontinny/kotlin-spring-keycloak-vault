version: '3.8'

services:
  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: vault-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: vault-root-token
    ports:
      - "8200:8200"
    volumes:
      - ./vault/init-secrets.sh:/vault/scripts/init-secrets.sh
    entrypoint: >
      sh -c "
        vault server -dev -dev-root-token-id=vault-root-token &
        sleep 2 &&
        sh /vault/scripts/init-secrets.sh &&
        wait
      "
    networks:
      - olist-network
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-keycloak:
    image: postgres:16
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: ${KC_DB_NAME}
      POSTGRES_USER: ${KC_DB_USERNAME}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    ports:
      - "${KC_DB_PORT}:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    networks:
      - olist-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME} -d ${KC_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-app:
    image: postgres:16
    container_name: postgres-app
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      - ./data:/data
    networks:
      - olist-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - olist-network
    healthcheck:
      test: [ "CMD-SHELL", "cat < /dev/null > /dev/tcp/localhost/8080 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olist-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-app:5432/${DB_NAME}
      SPRING_CLOUD_VAULT_URI: http://vault:8200
      SPRING_CLOUD_VAULT_TOKEN: vault-root-token
      SPRING_CLOUD_VAULT_ENABLED: "true"
      SPRING_CLOUD_VAULT_KV_ENABLED: "true"
      SPRING_CLOUD_VAULT_KV_BACKEND: secret
      SPRING_CLOUD_VAULT_KV_APPLICATION_NAME: keycloak-oauth
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      FLYWAY_LOCATIONS: classpath:db/migration/structure,classpath:db/migration/data
      SWAGGER_OAUTH2_AUTH_URL: http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      SWAGGER_OAUTH2_TOKEN_URL: http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
    ports:
      - "${APP_PORT}:9090"
    depends_on:
      vault:
        condition: service_healthy
      postgres-app:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - olist-network

networks:
  olist-network:
    driver: bridge

volumes:
  postgres_keycloak_data:
  postgres_app_data:
