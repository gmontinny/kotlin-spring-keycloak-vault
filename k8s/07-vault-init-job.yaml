apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: olist
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-vault
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z vault 8200; do sleep 2; done"]
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17
          env:
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: olist-secrets
                  key: VAULT_TOKEN
          command:
            - sh
            - -c
            - |
              vault secrets enable -path=secret kv-v2 2>/dev/null || true
              vault kv put secret/keycloak-oauth \
                spring.datasource.username=olist_user \
                spring.datasource.password=olist_pass \
                spring.security.oauth2.client.registration.keycloak.client-id=olist-client \
                spring.security.oauth2.client.registration.keycloak.client-secret=olist-client-secret
              echo "Vault secrets initialized."
