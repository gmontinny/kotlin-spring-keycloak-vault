apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: olist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: olist-secrets
                  key: VAULT_TOKEN
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          readinessProbe:
            exec:
              command: ["vault", "status"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: olist
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
